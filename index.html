
<script>
let bal=0, ticket=false, clicks=0;

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('logo').onclick=function(){
    clicks++;
    if(clicks>=5){showScreen('adminlogin');clicks=0;}
    setTimeout(()=>clicks=0,3000);
  }
});

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showTab(t,el){
  document.querySelectorAll('[id^=tab-]').forEach(x=>x.style.display='none');
  document.getElementById('tab-'+t).style.display='block';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
}

function login(){
  let n=document.getElementById('fullname').value.trim();
  let p=document.getElementById('phonedigits').value.trim();
  let c=document.getElementById('countrycode').value;
  if(n.length<3||p.length!=9||c==''){alert('Fill all fields');return;}
  showScreen('home');
}

function adminLogin(){
  let n=document.getElementById('adminname').value.trim().toUpperCase();
  let p=document.getElementById('adminphone').value.trim();
  if(n!='JADA CARD'||p!='788417769'){alert('Wrong credentials');return;}
  showScreen('adminpanel');
}

function logout(){
  bal=0;ticket=false;
  document.getElementById('balance').innerText='0';
  document.getElementById('wbal').innerText='0';
  document.getElementById('wbtn').disabled=true;
  document.getElementById('wbtn2').disabled=true;
  document.getElementById('yes').style.display='none';
  document.getElementById('no').style.display='block';
  document.getElementById('res').innerHTML='';
  showScreen('login');
}

function pay(){
  window.location.href='https://buy.stripe.com/5kQ4gz20Ugcm2ADgZZes000';
}

function scratch(){
  if(!ticket){
    ticket=true;
    document.getElementById('no').style.display='none';
    document.getElementById('yes').style.display='block';
  }
  let win=Math.random()<0.4;
  let amt=win?2000:0;
  if(win){
    bal+=amt;
    document.getElementById('res').innerHTML='<div class="result-win"><div style="color:#00ff88;font-weight:700;margin-bottom:10px">🎉 YOU WON!</div><div class="result-amount-win">ugx '+amt.toLocaleString()+'</div></div>';
    document.getElementById('balance').innerText=bal.toLocaleString();
    document.getElementById('wbal').innerText=bal.toLocaleString();
    if(bal>=50000){document.getElementById('wbtn').disabled=false;document.getElementById('wbtn2').disabled=false;}
  }else{
    document.getElementById('res').innerHTML='<div class="result-lose">try again</div>';
  }
  document.getElementById('area').onclick=null;
  document.getElementById('area').style.opacity='0.5';
}
</script>
