<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADA CARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#05050a;color:#fff;min-height:100vh;max-width:480px;margin:0 auto}
.screen{display:none;padding:20px}
.screen.active{display:block;animation:fade 0.3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
input,select{width:100%;padding:14px;margin:8px 0;background:#12121a;border:1px solid #2a2a3a;border-radius:12px;color:#fff;font-size:16px}
.btn{width:100%;padding:16px;margin:10px 0;background:linear-gradient(135deg,#00f5ff,#ff00ff);border:0;border-radius:14px;color:#000;font-weight:800;font-size:16px;cursor:pointer}
.card{background:#12121a;border:1px solid #2a2a3a;border-radius:18px;padding:20px;margin:14px 0}
.label{font-size:12px;color:#00f5ff;margin-left:5px;margin-bottom:3px;display:block}
.header{padding:20px;text-align:center;background:linear-gradient(135deg,#00f5ff 0%,#ff00ff 100%);font-weight:800;font-size:20px;color:#000}
.hidden{display:none}
</style>
</head>
<body>

<!-- USER LOGIN -->
<div id="login" class="screen active">
  <div class="header">JADA CARD</div>
  <div class="card">
    <span class="label">Full Name</span>
    <input id="fullname" placeholder="Enter your full name">
    <span class="label">Phone Number</span>
    <input id="phone" placeholder="9 digits" type="tel" maxlength="9">
    <button class="btn" onclick="userLogin()">Play Now</button>
    <div style="text-align:center;margin-top:15px;color:#666;font-size:12px">Tap logo 5x fast for admin</div>
  </div>
</div>

<!-- USER HOME -->
<div id="home" class="screen">
  <div class="header">JADA CARD - HOME</div>
  <div class="card">
    <h3>Welcome <span id="userName"></span> 🎉</h3>
    <p style="margin:10px 0;color:#aaa">Your balance: UGX <span id="userBalance">0</span></p>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- ADMIN LOGIN - HIDDEN -->
<div id="adminlogin" class="screen">
  <div class="header">ADMIN LOGIN</div>
  <div class="card">
    <span class="label">Admin Username</span>
    <input id="adminuser" placeholder="admin">
    <span class="label">Admin Password</span>
    <input id="adminpass" placeholder="password" type="password">
    <button class="btn" onclick="adminLogin()">Login</button>
    <button class="btn" style="background:#333;color:#fff" onclick="backToUser()">Back</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminpanel" class="screen">
  <div class="header">ADMIN PANEL</div>
  <div class="card">
    <h3>Admin Dashboard 🛡️</h3>
    <p style="margin:10px 0;color:#aaa">Total Users: <span id="totalUsers">0</span></p>
    <p style="margin:10px 0;color:#aaa">Total Balance: UGX <span id="totalBalance">0</span></p>
    <button class="btn" onclick="logoutAdmin()">Logout Admin</button>
  </div>
</div>

<script>
let logoClicks = 0;
let lastClickTime = 0;

// Secret admin trigger - tap logo 5 times fast
document.querySelector('.header').addEventListener('click', function() {
  let now = Date.now();
  if(now - lastClickTime > 1000) logoClicks = 0; // reset if too slow
  logoClicks++;
  lastClickTime = now;
  
  if(logoClicks >= 5) {
    showScreen('adminlogin');
    logoClicks = 0;
  }
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function userLogin() {
  let name = document.getElementById('fullname').value.trim();
  let phone = document.getElementById('phone').value.trim();
  
  if(name.length < 3) {
    alert('Enter full name');
    return;
  }
  if(phone.length !== 9 || isNaN(phone)) {
    alert('Enter valid 9 digit phone number');
    return;
  }
  
  document.getElementById('userName').textContent = name;
  document.getElementById('userBalance').textContent = Math.floor(Math.random() * 50000);
  showScreen('home');
}

function adminLogin() {
  let user = document.getElementById('adminuser').value;
  let pass = document.getElementById('adminpass').value;
  
  if(user === 'JADA CARD' && pass === '788417769') {
    document.getElementById('totalUsers').textContent = Math.floor(Math.random() * 100) + 50;
    document.getElementById('totalBalance').textContent = Math.floor(Math.random() * 5000000);
    showScreen('adminpanel');
  } else {
    alert('Wrong admin credentials!');
  }
}

function logout() {
  document.getElementById('fullname').value = '';
  document.getElementById('phone').value = '';
  showScreen('login');
}

function logoutAdmin() {
  document.getElementById('adminuser').value = '';
  document.getElementById('adminpass').value = '';
  showScreen('login');
}

function backToUser() {
  showScreen('login');
}
</script>
</body>
</html>
