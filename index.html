<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jada card</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#05050a;color:#fff}
.screen{display:none;padding-bottom:80px}
.screen.active{display:block}
.header{padding:20px;text-align:center;background:linear-gradient(135deg,#00f5ff,#ff00ff);font-weight:800;font-size:18px;position:relative}
.back-btn{position:absolute;left:15px;top:15px;font-size:28px;cursor:pointer;color:#00f5ff;font-weight:900}
.logout{position:absolute;top:20px;right:20px;font-size:22px;cursor:pointer}
.btn{width:90%;margin:15px auto;display:block;padding:15px;background:linear-gradient(135deg,#00f5ff,#ff00ff);border:0;border-radius:12px;color:#000;font-size:16px;font-weight:700;cursor:pointer}
.btn:disabled{background:#333;color:#666}
.btn-success{background:#00ff88}
.btn-danger{background:#ff4444;color:#fff}
input,select{width:90%;margin:10px auto;display:block;padding:14px;background:#12121a;border:2px solid #2a2a3a;border-radius:10px;color:#fff;font-size:16px}
.phone-group{display:flex;width:90%;margin:10px auto;gap:8px}
.phone-group select{width:45%}
.phone-group input{width:55%}
.card{background:#12121a;margin:15px;border-radius:15px;padding:20px;border:1px solid #2a2a3a}
.stat{display:flex;justify-content:space-between;margin:10px 0;color:#aaa}
.scratch-area{width:90%;height:280px;margin:20px auto;background:#1e1e2e;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#ffcc00;border:3px dashed #00f5ff;cursor:pointer}
.scratch-amount{font-size:36px;margin-top:10px;color:#00ff88}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#0c0c12;border-top:1px solid #2a2a3a;padding:8px 0}
.nav-btn{flex:1;text-align:center;font-size:11px;color:#888;cursor:pointer;padding:5px 0}
.nav-btn.active{color:#00f5ff}
.user-card{background:#1a1a2a;margin:8px 0;padding:10px;border-radius:8px;font-size:13px}
.req-card{background:rgba(255,204,0,0.1);border:2px solid #ffcc00;margin:8px 0;padding:12px;border-radius:10px;font-size:13px}
.small{font-size:12px;color:#888;text-align:center;margin-top:8px}
.label{font-size:12px;color:#00f5ff;margin-left:5%;display:block;margin-bottom:3px}
.tabs{display:flex;gap:5px;margin:10px 0}
.tab{flex:1;padding:8px;border-radius:6px;background:#1a1a2a;text-align:center;font-size:12px;cursor:pointer;border:1px solid #2a2a3a;position:relative}
.tab.active{background:#00f5ff;color:#000;font-weight:700}
.badge{position:absolute;top:-5px;right:-5px;background:red;color:#fff;border-radius:50%;width:20px;height:20px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
.pending-notice{background:rgba(255,204,0,0.2);border:2px solid #ffcc00;padding:12px;border-radius:10px;margin:10px 15px;text-align:center;font-size:14px}
#prize{animation:pop 0.5s}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div id="login" class="screen active">
  <div class="header">jada card<br><small>scratch & win ugx 1,000,000</small></div>
  <div style="text-align:center;padding:30px;font-size:50px">🎴</div>
  <input id="fullname" placeholder="full name">
  <div class="label">select country + 9 digits</div>
  <div class="phone-group">
    <select id="countrycode"></select>
    <input id="phonedigits" placeholder="9 digits" maxlength="9">
  </div>
  <button class="btn" onclick="userLogin()">play now</button>
  <div style="text-align:center;margin-top:15px">
    <button onclick="showScreen('adminlogin')" style="background:none;border:0;color:#00f5ff;font-size:12px">admin login</button>
  </div>
</div>
